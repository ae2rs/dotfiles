model = "gpt-5.3-codex"
model_reasoning_effort = "high"
personality = "pragmatic"

[projects."/Users/lucas/work/monorepo"]
trust_level = "trusted"
approval_policy = "on-request"
sandbox_mode    = "workspace-write"
bash_approval_policy = [
    { pattern = "clip*", approval = "auto-approve" },
    { pattern = "./tools/clippy.py*", approval = "auto-approve" }
]

[projects."/Users/lucas"]
trust_level = "trusted"

[projects."/Users/lucas/perso/iptrace"]
trust_level = "trusted"

[projects."/private/tmp/facebook-android-sdk"]
trust_level = "trusted"

[projects."/Users/lucas/dotfiles"]
trust_level = "trusted"

[projects."/private/tmp/facebook-ios-sdk"]
trust_level = "trusted"

[projects."/Users/lucas/perso/42K"]
trust_level = "trusted"

[projects."/Users/lucas/work/grpc_cache"]
trust_level = "trusted"

[projects."/Users/lucas/perso/blog.rs"]
trust_level = "trusted"

[projects."/Users/lucas/work/temporal-sdk-core"]
trust_level = "trusted"

[projects."/Users/lucas/work/monorepo-2"]
trust_level = "trusted"

[notice]
hide_gpt5_1_migration_prompt = true
"hide_gpt-5.1-codex-max_migration_prompt" = true
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"

[mcp_servers.context7]
args = ["-y", "@upstash/context7-mcp" ]
command = "bunx"

